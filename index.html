<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVING PLAZA BALIKPAPAN</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="login-wrapper">

  <div class="card">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login(event)">Login</button>
  </div>

</div>

<!-- ================= APP PAGE ================= -->
<div id="appPage" style="display:none;">

  <!-- OVERLAY SIDEBAR -->
  <div id="sidebar" class="sidebar"></div>
  <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

  <!-- HEADER (mobile app style) -->
  <div class="header">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>

    <b class="title">LIVING PLAZA</b>

    <span id="userName" class="user-label"></span>
  </div>

  <!-- CONTENT AREA -->
  <div id="content" class="content"></div>

  <!-- ================= BOTTOM NAV (NEW) ================= -->
  <div class="bottom-nav">

    <button onclick="renderBinCard()">
      📦
      <small>Bin</small>
    </button>

    <button onclick="renderItem()">
      📋
      <small>Item</small>
    </button>

    <button onclick="renderUser()">
      👤
      <small>Profile</small>
    </button>

  </div>

</div>

<!-- ================= LOADING ================= -->
<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- ================= TOAST ================= -->
<div id="toast-container"></div>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
