<!DOCTYPE html>
<html>
<header>
    <div class="logo">
        <h2 style="margin:0; font-size: 20px;">LIVING PLAZA</h2>
    </div>
    
    <div class="user-info-wrapper">
        <span id="user-display-name" style="font-weight: 500;">Asrul</span>
        <button onclick="logout()" class="btn-logout-header">
            Logout
        </button>
    </div>
   <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
</header>

<body>
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="spinner-container">
        <div class="spinner"></div>
        <div class="spinner-text">MOHON TUNGGU...</div>
    </div>
</div>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="login-wrapper">
  <div class="card login-card">
    <div class="login-header">
      <div class="login-icon">🏢</div>
      <h2>LIVING PLAZA</h2>
      <p>Inventory System Management</p>
    </div>
    
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password">
    </div>

    <button class="btn-login" onclick="login(event)">Masuk ke Aplikasi</button>
  </div>
</div>

<!-- ================= APP PAGE ================= -->
<div id="appPage" style="display:none;">

  <!-- OVERLAY SIDEBAR -->
  <div id="sidebar" class="sidebar"></div>
  <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

  <!-- HEADER (mobile app style) -->
  <div class="header">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>

    <b class="title">LIVING PLAZA</b>

    <span id="userName" class="user-label"></span>
  </div>

  <!-- CONTENT AREA -->
  <div id="content" class="content"></div>

  <!-- ================= BOTTOM NAV (NEW) ================= -->
 <div id="bottomNav" class="bottom-nav">

    <button onclick="renderDashboard()">
    📊
    <small>Dash</small>
  </button>

    <button onclick="renderBinCard()">
      📦
      <small>Bin</small>
    </button>

    <button onclick="renderItem()">
      📋
      <small>Item</small>
    </button>

    <button onclick="renderUser()">
      👤
      <small>Profile</small>
    </button>

  </div>

</div>

<!-- ================= TOAST ================= -->
<div id="toast-container"></div>

<!-- ================= FORM EDIT ================ -->
  <div id="modal-edit-user" class="loading-overlay" style="display: none;">
    <div class="card" style="max-width: 380px; width: 92%; background: #1e293b; color: white; padding: 15px; border-radius: 12px;">
        <h3 style="margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #334155; padding-bottom: 8px;">Edit User</h3>
        
        <input type="hidden" id="edit-user-id">
        
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <div style="flex: 2;">
                <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Nama</label>
                <input type="text" id="edit-nama" style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px;">
            </div>
            <div style="flex: 1;">
                <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">NIP</label>
                <input type="text" id="edit-nip" style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px;">
            </div>
        </div>

        <div style="margin-bottom: 10px;">
            <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Jabatan</label>
            <select id="edit-jabatan" style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px;">
                <option value="Leader">Leader</option>
                <option value="HO">HO</option>
                <option value="Supervisor">Supervisor</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Password Baru (Opsional)</label>
            <input type="password" id="edit-password" placeholder="Kosongkan jika tidak ganti" style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px;">
        </div>

        <div style="display: flex; gap: 8px;">
            <button onclick="saveEditUser()" style="flex: 1; background: #7c3aed; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px;">Simpan</button>
            <button onclick="closeModalEdit()" style="flex: 1; background: #334155; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;">Batal</button>
        </div>
    </div>
</div>
<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
