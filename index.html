<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK STORE</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>

  <style>
    .layout {
      display: flex;
    }

    .sidebar {
      position: fixed;
      left: -260px;
      top: 0;
      width: 260px;
      height: 100%;
      padding: 20px;
      transition: 0.3s;
      z-index: 1000;
    }

    .sidebar.show { left: 0; }

    .sidebar a {
      display: block;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      display: none;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(3px);
    }

    .overlay.show { display: block; }

    .main {
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
    }

    .content {
      padding: 20px;
    }

    .menu-btn {
      cursor: pointer;
      font-size: 20px;
    }
  </style>
</head>

<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar card"></div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header card">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>
    <b>HK STORE</b>

    <div>
      <span id="userName"></span>
      <span class="switch" onclick="toggleDark()">🌙</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content" class="content"></div>

</div>

<script>

// ================= CONFIG =================
const API_URL = "https://script.google.com/macros/s/AKfycbxxxx/exec";

// ================= STATE =================
let userData = JSON.parse(localStorage.getItem("user")) || null;

// ================= UI =================
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
  document.getElementById("overlay").classList.toggle("show");
}

// ================= TOAST =================
function showToast(msg){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(() => toast.classList.remove("show"), 3000);
}

// ================= LOADING =================
function showLoading(){
  document.getElementById("content").innerHTML =
    `<div class="card"><div class="loader"></div></div>`;
}

// ================= DARK MODE =================
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark") === "true"){
  document.body.classList.add("dark");
}

// ================= MENU =================
function renderMenu(){
  let menu = "<h2>HK STORE</h2>";

  if(!userData){
    menu += `
      <a onclick="renderLogin()">Login</a>
      <a onclick="renderSignup()">Sign Up</a>
    `;
  } else {
    menu += `
      <a onclick="renderDashboard()">Dashboard</a>
      <a onclick="renderBinCard()">BIN CARD</a>
      <a onclick="renderItem()">Item</a>
    `;

    if(userData.role === "admin"){
      menu += `<a onclick="renderUser()">Kelola User</a>`;
    }

    menu += `<a onclick="logout()">Logout</a>`;
  }

  document.getElementById("sidebar").innerHTML = menu;

  if(userData){
    document.getElementById("userName").innerText =
      userData.nama + " (" + userData.role + ")";
  }
}

// ================= LOGIN PAGE =================
function renderLogin(){
  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Login</h3>
      <input id="username" placeholder="Username">
      <input id="password" type="password" placeholder="Password">
      <button onclick="doLogin()">Login</button>
      <p id="status"></p>
    </div>
  `;
}

// ================= LOGIN =================
function doLogin(){
  showLoading();

  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      action: "login",
      username,
      password
    })
  })
  .then(res => res.json())
  .then(res => {

    if(res.status === "success"){
      userData = res;
      localStorage.setItem("user", JSON.stringify(res));

      showToast("Login berhasil ✅");

      setTimeout(() => {
        renderMenu();
        renderDashboard();
      }, 800);

    } else {
      renderLogin();
      showToast("Login gagal ❌");
    }

  })
  .catch(() => {
    renderLogin();
    showToast("Error koneksi ⚠️");
  });
}

// ================= DASHBOARD =================
function renderDashboard(){
  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Dashboard</h3>
      <p>Selamat datang <b>${userData.nama}</b></p>
    </div>
  `;
}

// ================= SIGNUP =================
function renderSignup(){
  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Register</h3>
      <input id="nama" placeholder="Nama">
      <input id="nip" placeholder="NIP">
      <input id="jabatan" placeholder="Jabatan">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="doRegister()">Daftar</button>
      <p id="status"></p>
    </div>
  `;
}

function doRegister(){
  showLoading();

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      action: "register",
      nama: document.getElementById("nama").value,
      nip: document.getElementById("nip").value,
      jabatan: document.getElementById("jabatan").value,
      password: document.getElementById("pass").value
    })
  })
  .then(res => res.json())
  .then(res => {
    renderSignup();
    showToast(res.status === "success" ? "Berhasil daftar ✅" : "Gagal daftar ❌");
  });
}

// ================= LOGOUT =================
function logout(){
  localStorage.removeItem("user");
  userData = null;
  renderMenu();
  renderLogin();
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  renderMenu();
  userData ? renderDashboard() : renderLogin();
});

</script>

</body>
</html>
