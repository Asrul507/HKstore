<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVING PLAZA BALIKPAPAN</title>

  <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="spinner-container">
        <div class="spinner"></div>
        <div class="spinner-text">MOHON TUNGGU...</div>
    </div>
</div>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="login-wrapper">
  <div class="card login-card">
    <div class="login-header">
      <div class="login-icon">🏢</div>
      <h2>LIVING PLAZA</h2>
      <p>Inventory System Management</p>
    </div>
    
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password">
    </div>

    <button class="btn-login" onclick="login(event)">Masuk ke Aplikasi</button>
  </div>
</div>

<!-- ================= APP PAGE ================= -->
<div id="appPage" style="display:none;">

  <!-- OVERLAY SIDEBAR -->
  <div id="sidebar" class="sidebar"></div>
  <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

  <!-- HEADER (mobile app style) -->
  <div class="header">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>

    <b class="title">LIVING PLAZA</b>

    <span id="userName" class="user-label"></span>
  </div>

  <!-- CONTENT AREA -->
  <div id="content" class="content"></div>

  <!-- ================= BOTTOM NAV (NEW) ================= -->
 <div id="bottomNav" class="bottom-nav">

    <button onclick="renderDashboard()">
    📊
    <small>Dash</small>
  </button>

    <button onclick="renderBinCard()">
      📦
      <small>Bin</small>
    </button>

    <button onclick="renderItem()">
      📋
      <small>Item</small>
    </button>

    <button onclick="renderUser()">
      👤
      <small>Profile</small>
    </button>

  </div>

</div>

<!-- ================= TOAST ================= -->
<div id="toast-container"></div>

<!-- ================= FORM EDIT ================ -->
  <div id="modal-edit-user" class="loading-overlay" style="display: none;">
    <div class="card" style="max-width: 400px; width: 90%; background: #1e293b; color: white;">
        <h3 style="margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">Edit Data User</h3>
        
        <input type="hidden" id="edit-user-id">
        
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 12px; margin-bottom: 5px;">Nama Lengkap</label>
            <input type="text" id="edit-nama" style="width:100%; padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 12px; margin-bottom: 5px;">NIP</label>
            <input type="text" id="edit-nip" style="width:100%; padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 12px; margin-bottom: 5px;">Jabatan</label>
            <select id="edit-jabatan" style="width:100%; padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white;">
                <option value="HO">Admin</option>
                <option value="Supervisor">Supervisor</option>
                <option value="Leader">Staff</option>
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; font-size: 12px; margin-bottom: 5px;">Password Baru (Kosongkan jika tidak ganti)</label>
            <input type="password" id="edit-password" placeholder="******" style="width:100%; padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white;">
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="saveEditUser()" style="flex: 1; background: #7c3aed; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Simpan</button>
            <button onclick="closeModalEdit()" style="flex: 1; background: #475569; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Batal</button>
        </div>
    </div>
</div>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
