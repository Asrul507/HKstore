<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOUSEKEEPING LIVING PLAZA BALIKPAPAN</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4300/4300058.png">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="spinner-container">
        <div class="spinner"></div>
        <div class="spinner-text">MOHON TUNGGU...</div>
    </div>
  </div>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div id="loginPage" class="login-wrapper">
  <div class="brand">
    <div class="brand-icon">🏢</div>
    <h1>Living Plaza</h1>
    <p>Inventory System · Balikpapan</p>
  </div>

  <div class="login-card">
    <div class="card-label">
      <i class="fa-solid fa-lock" style="font-size:11px"></i>
      Masuk ke Sistem
    </div>

    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Masukkan username"
          autocomplete="username" onkeydown="if(event.key==='Enter')login(event)">
        <i class="fa-solid fa-user input-icon"></i>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Masukkan password"
          autocomplete="current-password" onkeydown="if(event.key==='Enter')login(event)">
        <i class="fa-solid fa-lock input-icon"></i>
        <button class="eye-btn" type="button" onclick="
          var inp=this.closest('.input-wrap').querySelector('input');
          var ico=this.querySelector('i');
          if(inp.type==='password'){inp.type='text';ico.className='fa-solid fa-eye';}
          else{inp.type='password';ico.className='fa-solid fa-eye-slash';}
        ">
          <i class="fa-solid fa-eye-slash"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login(event)">
      <div class="spinner-ring"></div>
      <span class="btn-text">Masuk</span>
      <i class="fa-solid fa-arrow-right" style="font-size:13px"></i>
    </button>

    <div class="login-divider"><span>Housekeeping Division</span></div>

    <div class="login-footer">
      Sistem hanya untuk <span>staf resmi</span> Living Plaza Balikpapan
    </div>
  </div>
</div>


  <div id="appPage" style="display:none;">

    <div id="sidebar" class="sidebar"></div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

   <div class="main-header-sticky">
  <div class="header-left">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>
    <b class="title">LIVING PLAZA</b>
  </div>
  <div class="user-info-header">
    <div class="user-chip">
      <i class="fa-solid fa-circle-user"></i>
      <span id="userName"></span>
    </div>
    <button onclick="logout()" class="btn-logout-header">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>
</div>



    <div id="content" class="content"></div>

    <div id="bottomNav" class="bottom-nav"></div>


  </div>

  <div id="toast-container"></div>

  <div id="modal-edit-user" class="loading-overlay" style="display: none;">
      <div class="card" style="max-width: 380px; width: 92%; background: #1e293b; color: white; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
          <h3 style="margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #334155; padding-bottom: 8px;">Edit User</h3>
          
          <input type="hidden" id="edit-user-id">
          
          <div style="display: flex; gap: 10px; margin-bottom: 10px;">
              <div style="flex: 2;">
                  <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Nama</label>
                  <input type="text" id="edit-nama" style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px;">
              </div>
              <div style="flex: 1;">
                  <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">NIP</label>
                  <input type="text" id="edit-nip" readonly style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #334155; color: #94a3b8; font-size: 13px; cursor: not-allowed;">
              </div>
          </div>

          <div style="margin-bottom: 10px;">
              <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Jabatan</label>
              <select id="edit-jabatan" style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px;">
                  <option value="Leader">Leader</option>
                  <option value="HO">HO</option>
                  <option value="Supervisor">Supervisor</option>
              </select>
          </div>

          <div style="margin-bottom: 15px;">
              <label style="display:block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Password Baru (Opsional)</label>
              <input type="password" id="edit-password" placeholder="Kosongkan jika tidak ganti" style="width:100%; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px;">
          </div>

          <div style="display: flex; gap: 8px;">
              <button onclick="saveEditUser()" style="flex: 1; background: #7c3aed; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px;">Simpan</button>
              <button onclick="closeModalEdit()" style="flex: 1; background: #475569; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;">Batal</button>
          </div>
      </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
